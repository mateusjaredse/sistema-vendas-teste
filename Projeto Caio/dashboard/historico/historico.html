<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard - HistÃ³rico</title>
<link href="../../assets/fonts/css2" rel="stylesheet">
  <link rel="stylesheet" href="historico.css?v=responsive-proportional-1366-20260624">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<main class="history-page" data-module="historico">
  <div class="top-spacer" aria-hidden="true"></div>

  <section class="history-grid" aria-label="Dashboard HistÃ³rico">
    <article class="card history-card card-faturamento">
      <div class="card-head">
        <span class="card-title">Comparativo Faturamento</span>
        <div class="toggle-group" id="tg-faturamento">
          <button type="button" class="active" data-chart-mode="faturamento" data-mode="meses">Meses</button>
          <button type="button" data-chart-mode="faturamento" data-mode="anos">Anos</button>
        </div>
      </div>
      <div class="legend" id="leg-faturamento"></div>
      <div class="chart-wrap">
        <canvas id="chartFaturamento" aria-label="Comparativo de faturamento"></canvas>
      </div>
    </article>

    <article class="card history-card card-conversao">
      <div class="card-head">
        <span class="card-title">Funil de Vendas</span>
        <div class="toggle-group" id="tg-conversao">
          <button type="button" class="active" data-chart-mode="conversao" data-mode="meses">Meses</button>
          <button type="button" data-chart-mode="conversao" data-mode="anos">Anos</button>
        </div>
      </div>
      <div class="conversion-ring-list month-mode" id="conversionRingList" aria-label="Conversao por periodo"></div>
    </article>

    <article class="card history-card card-detalhado">
      <div class="card-head">
        <span class="card-title">Comparativo Detalhado</span>
        <div class="card-controls compare-controls">
          <div class="compare-picker" id="comparePicker">
            <button type="button" class="compare-picker-button" id="comparePickerButton">Selecionar perÃ­odo</button>
            <div class="compare-picker-menu" id="comparePickerMenu"></div>
          </div>
          <div class="selected-periods" id="selectedPeriods"></div>
        </div>
      </div>
      <div class="compare-layout">
        <div class="compare-chart-panel">
          <div class="legend" id="leg-detalhado"></div>
          <div class="chart-wrap">
            <canvas id="chartDetalhado" aria-label="Comparativo detalhado"></canvas>
          </div>
        </div>
        <aside class="info-panel" id="infoPanel">
          <div class="info-panel-title">Resumo</div>
          <div class="info-head">
            <div></div>
            <div class="info-col-head" id="ih1">-</div>
            <div class="info-col-head" id="ih2">-</div>
          </div>
          <div class="info-row">
            <div class="info-label">Faturamento</div>
            <div class="info-val" id="iv-fat1">-</div>
            <div class="info-val" id="iv-fat2">-</div>
          </div>
          <div class="info-row">
            <div class="info-label">Meta</div>
            <div class="info-val" id="iv-meta1">-</div>
            <div class="info-val" id="iv-meta2">-</div>
          </div>
          <div class="info-row">
            <div class="info-label">Concluído</div>
            <div class="info-val" id="iv-done1">-</div>
            <div class="info-val" id="iv-done2">-</div>
          </div>
          <div class="info-row">
            <div class="info-label">Ticket Médio</div>
            <div class="info-val" id="iv-tkt1">-</div>
            <div class="info-val" id="iv-tkt2">-</div>
          </div>
          <div class="info-row">
            <div class="info-label">Clientes Atendidos</div>
            <div class="info-val" id="iv-cli1">-</div>
            <div class="info-val" id="iv-cli2">-</div>
          </div>
          <div class="info-row">
            <div class="info-label">Clientes Novos</div>
            <div class="info-val" id="iv-new1">-</div>
            <div class="info-val" id="iv-new2">-</div>
          </div>
          <div class="info-row">
            <div class="info-label">Vendas Perdidas</div>
            <div class="info-val" id="iv-lost1">-</div>
            <div class="info-val" id="iv-lost2">-</div>
          </div>
          <div class="info-row">
            <div class="info-label">NFE Geradas</div>
            <div class="info-val" id="iv-nfe1">-</div>
            <div class="info-val" id="iv-nfe2">-</div>
          </div>
        </aside>
      </div>
    </article>

    <article class="card history-card card-projecao">
      <div class="card-head">
        <span class="card-title">PROJEÇÃO</span>
        <div class="toggle-group" id="tg-projecao">
          <button type="button" class="active" data-chart-mode="projecao" data-mode="meses">Meses</button>
          <button type="button" data-chart-mode="projecao" data-mode="anos">Anos</button>
        </div>
      </div>
      <div class="chart-wrap projection-flow-wrap">
        <div class="projection-flow-canvas" id="projection-flow-chart" aria-label="Projeção de faturamento"></div>
      </div>
    </article>
  </section>
</main>
  <script src="../../app/js/supabase-dashboard.js?v=responsive-proportional-1366-20260624"></script>
<script src="historico.js?v=historico-funil-legenda-lateral-20260623"></script>
</body>
</html>
