<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard - Clientes</title>
<link href="../../assets/fonts/css2" rel="stylesheet">
<link rel="stylesheet" href="clientes.css?v=clientes-pop-produtos-20260623">
</head>
<body>
<main class="clients-page" data-module="clientes">
  <div class="top-spacer"></div>
  <section class="clients-grid">
    <article class="client-card ranking-card">
      <div class="card-toolbar ranking-toolbar">
        <div>
          <h2>Ranking</h2>
        </div>
        <div class="sales-filter ranking-month-filter" aria-label="Filtro de mes do ranking">
          <select id="ranking-filter-month" aria-label="Selecionar mes do ranking">
            <option value="">Ano todo</option>
            <option value="01">Janeiro</option>
            <option value="02">Fevereiro</option>
            <option value="03">Marco</option>
            <option value="04">Abril</option>
            <option value="05">Maio</option>
            <option value="06">Junho</option>
            <option value="07">Julho</option>
            <option value="08">Agosto</option>
            <option value="09">Setembro</option>
            <option value="10">Outubro</option>
            <option value="11">Novembro</option>
            <option value="12">Dezembro</option>
          </select>
        </div>
        <div class="segmented compact" aria-label="Alternar ranking">
          <button class="active" type="button" data-ranking="faturamento">Faturamento</button>
          <button type="button" data-ranking="nfe">NFE</button>
        </div>
      </div>
      <div class="ranking-board" id="ranking-board" aria-label="Ranking de clientes"></div>
    </article>
    <article class="client-card new-clients-card">
      <div class="card-toolbar">
        <div>
          <h2>Quantidade de Clientes Novos</h2>
        </div>
      </div>
      <div class="new-clients-grid" id="new-clients-grid" aria-label="Quantidade de clientes novos por mes">
      </div>
      <div class="new-clients-legend">
        <div class="ncl-item"><div class="ncl-dot ncl-dot--max"></div> Maior Mes</div>
        <div class="ncl-item"><div class="ncl-dot ncl-dot--min"></div> Menor Mes</div>
      </div>
    </article>
    <article class="client-card sales-panel-card">
      <div class="card-toolbar sales-list-toolbar">
        <div>
          <h2>Lista de Vendas</h2>
        </div>
        <div class="sales-filter" aria-label="Filtro de periodo da lista">
          <select id="sales-filter-month" aria-label="Selecionar mes">
            <option value="">Ano todo</option>
            <option value="01">Janeiro</option>
            <option value="02">Fevereiro</option>
            <option value="03">Marco</option>
            <option value="04">Abril</option>
            <option value="05">Maio</option>
            <option value="06">Junho</option>
            <option value="07">Julho</option>
            <option value="08">Agosto</option>
            <option value="09">Setembro</option>
            <option value="10">Outubro</option>
            <option value="11">Novembro</option>
            <option value="12">Dezembro</option>
          </select>
        </div>
      </div>
      <div class="visor-strip" id="client-visor-strip" aria-label="Resumo de indicadores de clientes"></div>
      <div class="sales-table-wrap">
        <table class="sales-table" aria-label="Lista de vendas filtrada">
          <colgroup id="sales-list-cols"></colgroup>
          <thead id="sales-list-head"></thead>
          <tbody id="sales-list-body"></tbody>
        </table>
      </div>
    </article>
  </section>
</main>
<script src="../../app/js/supabase-dashboard.js?v=auth-persistente-20260622"></script>
<script src="clientes.js?v=clientes-visores-bd-principal-secundario-20260623"></script>
</body>
</html>
