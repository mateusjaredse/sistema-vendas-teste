<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard - Produtos</title>
<link href="../../assets/fonts/css2" rel="stylesheet">
<link rel="stylesheet" href="produtos.css?v=responsive-proportional-1366-20260624">
</head>
<body>
<main class="products-page" data-module="produtos">
  <div class="top-spacer"></div>
  <section class="products-grid">
    <article class="product-card variation-card">
      <div class="card-toolbar variation-toolbar">
        <div>
          <h2>VARIAÇÃO DE PRODUTOS NO MES</h2>
        </div>
        <div class="segmented compact" aria-label="Alternar variação de produtos">
          <button class="active" type="button" data-variation="faturamento">Faturamento</button>
          <button type="button" data-variation="quantidade">Quantidade</button>
        </div>
      </div>
      <div class="variation-columns">
        <div class="variation-col">
          <h3 class="variation-title variation-title-up">Maiores Altas</h3>
          <div class="variation-list" id="var-up-list"></div>
        </div>
        <div class="variation-col">
          <h3 class="variation-title variation-title-down">Maiores Baixas</h3>
          <div class="variation-list" id="var-down-list"></div>
        </div>
      </div>
      <div class="ticker-wrap" aria-label="Variações de produtos">
        <div class="ticker-track" id="var-ticker"></div>
      </div>
    </article>

    <article class="product-card ranking-card">
      <div class="card-toolbar ranking-toolbar">
        <div>
          <h2>Ranking</h2>
        </div>
        <div class="ranking-month-filter" aria-label="Filtro de mÃªs do ranking">
          <select id="ranking-filter-month" aria-label="Selecionar mÃªs do ranking">
            <option value="">Ano todo</option>
            <option value="01">Janeiro</option>
            <option value="02">Fevereiro</option>
            <option value="03">MarÃ§o</option>
            <option value="04">Abril</option>
            <option value="05">Maio</option>
            <option value="06">Junho</option>
            <option value="07">Julho</option>
            <option value="08">Agosto</option>
            <option value="09">Setembro</option>
            <option value="10">Outubro</option>
            <option value="11">Novembro</option>
            <option value="12">Dezembro</option>
          </select>
        </div>
        <div class="segmented compact" aria-label="Alternar ranking">
          <button class="active" type="button" data-ranking="faturamento">Faturamento</button>
          <button type="button" data-ranking="quantidade">Quantidade</button>
        </div>
      </div>
      <div class="ranking-board" id="ranking-board" aria-label="Ranking de produtos"></div>
    </article>
  </section>
</main>
<script src="../../app/js/supabase-dashboard.js?v=responsive-proportional-1366-20260624"></script>
<script src="produtos.js?v=produtos-percentual-duas-casas-20260623"></script>
</body>
</html>
